<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="360"
     viewBox="0 0 1200 360" preserveAspectRatio="xMidYMin meet"
     role="img" aria-label="Achievements">
  <defs>
    <linearGradient id="tr-cabinet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A0F0A"/>
      <stop offset="40%" stop-color="#2A1A12"/>
      <stop offset="100%" stop-color="#0E0805"/>
    </linearGradient>
    <linearGradient id="tr-shelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C3A24"/>
      <stop offset="100%" stop-color="#3A2418"/>
    </linearGradient>
    <filter id="tr-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
    <radialGradient id="tr-grad-0" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="50%" stop-color="#FFD23F" stop-opacity="0.95"/><stop offset="100%" stop-color="#FFD23F" stop-opacity="0.55"/></radialGradient>
  <radialGradient id="tr-grad-1" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="50%" stop-color="#FF6B9D" stop-opacity="0.95"/><stop offset="100%" stop-color="#FF6B9D" stop-opacity="0.55"/></radialGradient>
  <radialGradient id="tr-grad-2" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/><stop offset="50%" stop-color="#22D3EE" stop-opacity="0.95"/><stop offset="100%" stop-color="#22D3EE" stop-opacity="0.55"/></radialGradient>
  </defs>
  <style><![CDATA[
    .tr-title { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 900; font-size: 24px; letter-spacing: 0.24em; text-transform: uppercase; fill: #FFFFFF; }
    .tr-label { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 700; font-size: 13px; fill: #FFFFFF; fill-opacity: 0.92; letter-spacing: 0.04em; }
    .tr-date  { font-family: 'JetBrains Mono','SF Mono',monospace; font-weight: 500; font-size: 10px; fill: #FFFFFF; fill-opacity: 0.55; letter-spacing: 0.12em; }
    .tr-glyph { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 800; font-size: 28px; fill: #FFFFFF; text-anchor: middle; }
  ]]></style>
  <rect x="0" y="0" width="1200" height="360" fill="url(#tr-cabinet)"/>
  <rect x="20" y="20" width="1160" height="320" fill="none"
        stroke="#5C3A24" stroke-opacity="0.6" stroke-width="2"/>
  <text x="600.0" y="48" class="tr-title" text-anchor="middle">Achievements</text>
  
  <g transform="translate(253.3,195.0)">
    <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(-253.3,-195.0)">
      <path d="M 253.3,147.0 L 294.9,171.0 L 294.9,219.0 L 253.3,243.0 L 211.8,219.0 L 211.8,171.0 Z" fill="url(#tr-grad-0)" stroke="#FFFFFF"
            stroke-opacity="0.42" stroke-width="2" filter="url(#tr-shadow)"/>
      <path d="M 253.3,147.0 L 294.9,171.0 L 294.9,219.0 L 253.3,243.0 L 211.8,219.0 L 211.8,171.0 Z" fill="none" stroke="#FFD23F" stroke-opacity="0.9"
            stroke-width="1.5" stroke-dasharray="3 4">
        <animate attributeName="stroke-dashoffset" from="0" to="-14"
                 dur="6s" repeatCount="indefinite"/>
      </path>
      <text x="253.3" y="201.0" class="tr-glyph" text-anchor="middle">F</text>
    </g>
  </g>
  <text x="253.3" y="265.0" class="tr-label" text-anchor="middle">Founder</text>
  <text x="253.3" y="281.0" class="tr-date" text-anchor="middle"></text>

  <g transform="translate(600.0,195.0)">
    <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="3.9s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(-600.0,-195.0)">
      <path d="M 600.0,147.0 L 641.6,171.0 L 641.6,219.0 L 600.0,243.0 L 558.4,219.0 L 558.4,171.0 Z" fill="url(#tr-grad-1)" stroke="#FFFFFF"
            stroke-opacity="0.42" stroke-width="2" filter="url(#tr-shadow)"/>
      <path d="M 600.0,147.0 L 641.6,171.0 L 641.6,219.0 L 600.0,243.0 L 558.4,219.0 L 558.4,171.0 Z" fill="none" stroke="#FF6B9D" stroke-opacity="0.9"
            stroke-width="1.5" stroke-dasharray="3 4">
        <animate attributeName="stroke-dashoffset" from="0" to="-14"
                 dur="6s" repeatCount="indefinite"/>
      </path>
      <text x="600.0" y="201.0" class="tr-glyph" text-anchor="middle">S</text>
    </g>
  </g>
  <text x="600.0" y="265.0" class="tr-label" text-anchor="middle">Shipper</text>
  <text x="600.0" y="281.0" class="tr-date" text-anchor="middle"></text>

  <g transform="translate(946.7,195.0)">
    <animateTransform attributeName="transform" type="scale" values="1;1.03;1" dur="4.3s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(-946.7,-195.0)">
      <path d="M 946.7,147.0 L 988.2,171.0 L 988.2,219.0 L 946.7,243.0 L 905.1,219.0 L 905.1,171.0 Z" fill="url(#tr-grad-2)" stroke="#FFFFFF"
            stroke-opacity="0.42" stroke-width="2" filter="url(#tr-shadow)"/>
      <path d="M 946.7,147.0 L 988.2,171.0 L 988.2,219.0 L 946.7,243.0 L 905.1,219.0 L 905.1,171.0 Z" fill="none" stroke="#22D3EE" stroke-opacity="0.9"
            stroke-width="1.5" stroke-dasharray="3 4">
        <animate attributeName="stroke-dashoffset" from="0" to="-14"
                 dur="6s" repeatCount="indefinite"/>
      </path>
      <text x="946.7" y="201.0" class="tr-glyph" text-anchor="middle">M</text>
    </g>
  </g>
  <text x="946.7" y="265.0" class="tr-label" text-anchor="middle">Mentor</text>
  <text x="946.7" y="281.0" class="tr-date" text-anchor="middle"></text>

</svg>
