<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="140"
     viewBox="0 0 1200 140" preserveAspectRatio="none"
     role="img" aria-label="@your-handle">
  <defs>
    <linearGradient id="bannerBgFooter" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0E0820"/><stop offset="25%" stop-color="#7B5EAA"/><stop offset="50%" stop-color="#C95E8A"/><stop offset="75%" stop-color="#4F8CC4"/><stop offset="100%" stop-color="#0E0820"/>
      
    </linearGradient>
    <filter id="bannerWaveGlow" x="-5%" y="-50%" width="110%" height="200%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>
  <style><![CDATA[
    .banner-title    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 800; font-size: 54px; letter-spacing: -0.015em; fill: #FFFFFF; }
    .banner-subtitle { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 500; font-size: 18px; letter-spacing: 0.18em; text-transform: uppercase; fill: #FFFFFF; fill-opacity: 0.78; }
    .banner-pulse { animation: bannerPulse 7s ease-in-out infinite; }
    @keyframes bannerPulse { 0%, 100% { opacity: 0.85; } 50% { opacity: 1.0; } }
  ]]></style>
  <path d="M 0,0.0 L 1200,40.0 L 1200,140 L 0,140 Z" fill="url(#bannerBgFooter)"/>
  
  <text x="600" y="105.0" class="banner-title" text-anchor="middle">@your-handle</text><text x="600" y="137.0" class="banner-subtitle" text-anchor="middle">Built with Cortex · cortex.dev</text>
</svg>
