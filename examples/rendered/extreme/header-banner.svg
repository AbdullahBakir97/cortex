  ]]></style>
  <path d="M 0,210.0 Q 70.0,188.0 140.0,210.0 T 280.0,210.0 T 420.0,210.0 T 560.0,210.0 T 700.0,210.0 T 840.0,210.0 T 980.0,210.0 T 1120.0,210.0 T 1260.0,210.0 L 1200,0 L 0,0 Z" fill="url(#bannerBg)"/>
