<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="240"
     viewBox="0 0 1200 240" preserveAspectRatio="none"
     role="img" aria-label="Cortex">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0E0820"/><stop offset="25%" stop-color="#7B5EAA"/><stop offset="50%" stop-color="#C95E8A"/><stop offset="75%" stop-color="#4F8CC4"/><stop offset="100%" stop-color="#0E0820"/>
      <animate attributeName="x1" values="-1;1;-1" dur="22s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/><animate attributeName="x2" values="0;2;0" dur="22s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </linearGradient>
    <filter id="bannerWaveGlow" x="-5%" y="-50%" width="110%" height="200%">
