<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1380" height="660" viewBox="0 0 1380 660" role="img" aria-label="Career timeline 2023 — 2026">
  <style>
    .t-display     { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 800; font-size: 30px; letter-spacing: -0.01em; fill: #FFFFFF; }
    .t-tag         { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 0.30em; text-transform: uppercase; fill: #C4B5FD; }
    .t-year        { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 800; font-size: 20px; letter-spacing: -0.04em; }
    .t-year-tag    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 600; font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; }
    .t-headline    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.01em; fill: #FFFFFF; }
    .t-highlight   { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 500; font-size: 11.5px; fill: #E8E8E8; }
    .t-bullet      { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 700; font-size: 13px; }
    .t-stat-num    { font-family: 'JetBrains Mono','SF Mono',Consolas,monospace; font-weight: 700; font-size: 18px; }
    .t-stat-lbl    { font-family: 'Inter','SF Pro Display','Segoe UI',sans-serif; font-weight: 600; font-size: 7.5px; letter-spacing: 0.15em; text-transform: uppercase; fill: #6E7681; }
    .timeline-pulse { stroke-dasharray: 4 8; animation: tlflow 3s linear infinite; }
    @keyframes tlflow { to { stroke-dashoffset: -36; } }
    .marker-pulse { animation: markerPulse 2s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes markerPulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.10); opacity: 0.85; } }
    .live-pulse { animation: livePulse 1.4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    @keyframes livePulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(255,210,63,0.6)); } 50% { transform: scale(1.06); filter: drop-shadow(0 0 14px rgba(255,210,63,1)); } }
    .card-rise { opacity: 0; animation: cardRise 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }
    @keyframes cardRise { to { opacity: 1; } }
    .y0 { animation-delay: 0.30s; } .y1 { animation-delay: 0.50s; }
    .y2 { animation-delay: 0.70s; } .y3 { animation-delay: 0.90s; }
    .y4 { animation-delay: 1.10s; } .y5 { animation-delay: 1.30s; }
    .breathe-border { animation: breathe 3.4s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{stroke-opacity:0.7} 50%{stroke-opacity:1} }
  </style>
  <defs>
    <radialGradient id="bgRadial" cx="50%" cy="50%" r="80%"><stop offset="0%" stop-color="#0F0816"/><stop offset="100%" stop-color="#000000"/></radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="0.8" fill="#F90001" fill-opacity="0.07"/></pattern>
    <linearGradient id="tlGrad" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#A78BFA"/><stop offset="33%" stop-color="#F90001"/><stop offset="66%" stop-color="#FF652F"/><stop offset="100%" stop-color="#FFD23F"/></linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1C1428" stop-opacity="0.94"/><stop offset="100%" stop-color="#0A0612" stop-opacity="0.94"/></linearGradient>
    <radialGradient id="markerGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/><stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/></radialGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur in="SourceAlpha" stdDeviation="5"/><feOffset dx="0" dy="3" result="shadow"/><feFlood flood-color="#000000" flood-opacity="0.65"/><feComposite in2="shadow" operator="in"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1380" height="660" fill="url(#bgRadial)"/>
  <rect width="1380" height="660" fill="url(#dots)"/>
  <text x="690" y="42" class="t-tag" text-anchor="middle">⏵ CAREER · TIMELINE · 2023 — 2026 ⏴</text>
  <text x="690" y="78" class="t-display" text-anchor="middle">Yearly Journey</text>
  <line x1="140" y1="160" x2="1240" y2="160" stroke="url(#tlGrad)" stroke-width="3" stroke-opacity="0.4"/>
  <line x1="140" y1="160" x2="1240" y2="160" stroke="url(#tlGrad)" stroke-width="3" class="timeline-pulse"/>
  <g transform="translate(180,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0D1117" stroke="#A78BFA" stroke-width="2" class="marker-pulse" style="animation-delay:0.0s"/>
    <text x="0" y="6" class="t-year" fill="#A78BFA" text-anchor="middle">&apos;23</text>
  </g>
  <g transform="translate(520,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0D1117" stroke="#F90001" stroke-width="2" class="marker-pulse" style="animation-delay:0.3s"/>
    <text x="0" y="6" class="t-year" fill="#F90001" text-anchor="middle">&apos;24</text>
  </g>
  <g transform="translate(860,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0D1117" stroke="#FF652F" stroke-width="2" class="marker-pulse" style="animation-delay:0.6s"/>
    <text x="0" y="6" class="t-year" fill="#FF652F" text-anchor="middle">&apos;25</text>
  </g>
  <g transform="translate(1200,160)">
    <circle r="34" fill="url(#markerGlow)"/>
    <circle r="24" fill="#0D1117" stroke="#FFD23F" stroke-width="2" class="marker-pulse" style="animation-delay:0.9s"/>
    <text x="0" y="6" class="t-year" fill="#FFD23F" text-anchor="middle">&apos;26</text>
    <g transform="translate(60, 0)" class="live-pulse">
      <rect x="0" y="-12" width="60" height="22" rx="11" fill="#FFD23F"/>
      <circle cx="11" cy="-1" r="3.5" fill="#0D1117"/>
      <text x="40" y="3" class="t-year-tag" fill="#0D1117" text-anchor="middle" font-weight="700">LIVE</text>
    </g>
  </g>
  <g transform="translate(20, 230)" class="card-rise y0">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="url(#cardBg)" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="none" stroke="#A78BFA" stroke-width="2" class="breathe-border"/>
    <text x="24" y="36" class="t-year-tag" fill="#A78BFA">2023 · ORIGIN</text>
    <text x="24" y="72" class="t-headline">First Steps</text>
    <line x1="24" y1="92" x2="296" y2="92" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="124" class="t-bullet" fill="#A78BFA">▸</text>
    <text x="48"  y="124" class="t-highlight">Started shipping public projects —</text>
    <text x="48"  y="142" class="t-highlight">Django-Store, Jobs-Portal,</text>
    <text x="48"  y="160" class="t-highlight">BookStore.</text>
    <text x="24"  y="196" class="t-bullet" fill="#A78BFA">▸</text>
    <text x="48"  y="196" class="t-highlight">Built foundations in Python,</text>
    <text x="48"  y="214" class="t-highlight">Django, REST APIs, JS &amp; HTML/CSS.</text>
    <text x="24"  y="250" class="t-bullet" fill="#A78BFA">▸</text>
    <text x="48"  y="250" class="t-highlight">Earned first community stars —</text>
    <text x="48"  y="268" class="t-highlight">Jobs-Portal &amp; Django-Blog took</text>
    <text x="48"  y="286" class="t-highlight">off.</text>
    <line x1="24" y1="284" x2="296" y2="284" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="316" class="t-stat-num" fill="#A78BFA">15+</text>
    <text x="24"  y="334" class="t-stat-lbl">PROJECTS</text>
    <text x="114"  y="316" class="t-stat-num" fill="#A78BFA">30★</text>
    <text x="114"  y="334" class="t-stat-lbl">PEAK STARS</text>
    <text x="204"  y="316" class="t-stat-num" fill="#A78BFA">FIRST</text>
    <text x="204"  y="334" class="t-stat-lbl">CLIENT</text>
  </g>
  <g transform="translate(360, 230)" class="card-rise y1">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#F90001" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="url(#cardBg)" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="none" stroke="#F90001" stroke-width="2" class="breathe-border"/>
    <text x="24" y="36" class="t-year-tag" fill="#F90001">2024 · FOUNDATION</text>
    <text x="24" y="72" class="t-headline">A Year of Shipping</text>
    <line x1="24" y1="92" x2="296" y2="92" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="124" class="t-bullet" fill="#F90001">▸</text>
    <text x="48"  y="124" class="t-highlight">Wave of full-stack Django + Vue</text>
    <text x="48"  y="142" class="t-highlight">projects went live for real users.</text>
    <text x="24"  y="178" class="t-bullet" fill="#F90001">▸</text>
    <text x="48"  y="178" class="t-highlight">Established long-running client</text>
    <text x="48"  y="196" class="t-highlight">engagements that still run today.</text>
    <text x="24"  y="232" class="t-bullet" fill="#F90001">▸</text>
    <text x="48"  y="232" class="t-highlight">Earned community recognition —</text>
    <text x="48"  y="250" class="t-highlight">Barber-Salon hit 52★, Django-LMS</text>
    <text x="48"  y="268" class="t-highlight">22★.</text>
    <line x1="24" y1="284" x2="296" y2="284" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="316" class="t-stat-num" fill="#F90001">25+</text>
    <text x="24"  y="334" class="t-stat-lbl">PROJECTS</text>
    <text x="114"  y="316" class="t-stat-num" fill="#F90001">52★</text>
    <text x="114"  y="334" class="t-stat-lbl">PEAK STARS</text>
    <text x="204"  y="316" class="t-stat-num" fill="#F90001">5+</text>
    <text x="204"  y="334" class="t-stat-lbl">CLIENTS</text>
  </g>
  <g transform="translate(700, 230)" class="card-rise y2">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#FF652F" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="url(#cardBg)" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="none" stroke="#FF652F" stroke-width="2" class="breathe-border"/>
    <text x="24" y="36" class="t-year-tag" fill="#FF652F">2025 · GROWTH</text>
    <text x="24" y="72" class="t-headline">Production &amp; AI</text>
    <line x1="24" y1="92" x2="296" y2="92" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="124" class="t-bullet" fill="#FF652F">▸</text>
    <text x="48"  y="124" class="t-highlight">Maintained &amp; grew long-running</text>
    <text x="48"  y="142" class="t-highlight">client systems through their first</text>
    <text x="48"  y="160" class="t-highlight">full year in production.</text>
    <text x="24"  y="196" class="t-bullet" fill="#FF652F">▸</text>
    <text x="48"  y="196" class="t-highlight">Hands-on with the AI/LLM stack —</text>
    <text x="48"  y="214" class="t-highlight">local models, RAG, agent</text>
    <text x="48"  y="232" class="t-highlight">workflows.</text>
    <text x="24"  y="268" class="t-bullet" fill="#FF652F">▸</text>
    <text x="48"  y="268" class="t-highlight">Contributed to community &amp;</text>
    <text x="48"  y="286" class="t-highlight">educational projects beyond own</text>
    <text x="48"  y="304" class="t-highlight">work.</text>
    <line x1="24" y1="284" x2="296" y2="284" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="316" class="t-stat-num" fill="#FF652F">2+</text>
    <text x="24"  y="334" class="t-stat-lbl">SAAS LIVE</text>
    <text x="114"  y="316" class="t-stat-num" fill="#FF652F">10+</text>
    <text x="114"  y="334" class="t-stat-lbl">AI EXPERIMENTS</text>
    <text x="204"  y="316" class="t-stat-num" fill="#FF652F">200+</text>
    <text x="204"  y="334" class="t-stat-lbl">DEPLOYS</text>
  </g>
  <g transform="translate(1040, 230)" class="card-rise y3">
    <line x1="160" y1="0" x2="160" y2="-60" stroke="#FFD23F" stroke-width="1" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="url(#cardBg)" filter="url(#cardShadow)"/>
    <rect x="0" y="0" width="320" height="360" rx="16" fill="none" stroke="#FFD23F" stroke-width="2" class="breathe-border"/>
    <text x="24" y="36" class="t-year-tag" fill="#FFD23F">2026 · CURRENT YEAR</text>
    <text x="24" y="72" class="t-headline">Tooling &amp; Reach</text>
    <line x1="24" y1="92" x2="296" y2="92" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="124" class="t-bullet" fill="#FFD23F">▸</text>
    <text x="48"  y="124" class="t-highlight">Shifting to developer tooling &amp;</text>
    <text x="48"  y="142" class="t-highlight">automation — building for</text>
    <text x="48"  y="160" class="t-highlight">engineers, not just end users.</text>
    <text x="24"  y="196" class="t-bullet" fill="#FFD23F">▸</text>
    <text x="48"  y="196" class="t-highlight">Branching from web into desktop</text>
    <text x="48"  y="214" class="t-highlight">and CLI applications.</text>
    <text x="24"  y="250" class="t-bullet" fill="#FFD23F">▸</text>
    <text x="48"  y="250" class="t-highlight">Investing in public presence —</text>
    <text x="48"  y="268" class="t-highlight">portfolio, blog, open-source.</text>
    <line x1="24" y1="284" x2="296" y2="284" stroke="#21262D" stroke-width="1"/>
    <text x="24"  y="316" class="t-stat-num" fill="#FFD23F">5</text>
    <text x="24"  y="334" class="t-stat-lbl">GH APPS</text>
    <text x="114"  y="316" class="t-stat-num" fill="#FFD23F">v1</text>
    <text x="114"  y="334" class="t-stat-lbl">PYDEV PLATFORM</text>
    <text x="204"  y="316" class="t-stat-num" fill="#FFD23F">9+</text>
    <text x="204"  y="334" class="t-stat-lbl">NEW REPOS</text>
  </g>
</svg>
