<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="360"
     viewBox="0 0 1200 360" preserveAspectRatio="xMidYMin meet"
     role="img" aria-label="Career roadmap">
  <defs>
    <filter id="rd-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="1.4"/></feComponentTransfer>
    </filter>
  </defs>
  <style><![CDATA[
    .rd-title    { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 900; font-size: 22px; letter-spacing: 0.20em; text-transform: uppercase; fill: #FFFFFF; }
    .rd-station  { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 700; font-size: 12px; fill: #FFFFFF; fill-opacity: 0.92; }
    .rd-axis     { font-family: 'JetBrains Mono','SF Mono',monospace; font-weight: 500; font-size: 11px; fill: #FFFFFF; fill-opacity: 0.62; letter-spacing: 0.06em; }
    .rd-legend   { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 600; font-size: 13px; fill: #FFFFFF; fill-opacity: 0.85; }
    .rd-legend-h { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 800; font-size: 11px; letter-spacing: 0.30em; fill: #FFFFFF; fill-opacity: 0.55; }
    .rd-live     { font-family: 'Inter','SF Pro Display',sans-serif; font-weight: 900; font-size: 12px; fill: #FFFFFF; }
  ]]></style>
  <text x="600.0" y="40" class="rd-title" text-anchor="middle">Career roadmap</text><line x1="240" y1="332" x2="1140" y2="332" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/><text x="240.0" y="344.0" class="rd-axis" text-anchor="middle">2020</text><text x="390.0" y="344.0" class="rd-axis" text-anchor="middle">2021</text><text x="540.0" y="344.0" class="rd-axis" text-anchor="middle">2022</text><text x="690.0" y="344.0" class="rd-axis" text-anchor="middle">2023</text><text x="840.0" y="344.0" class="rd-axis" text-anchor="middle">2024</text><text x="990.0" y="344.0" class="rd-axis" text-anchor="middle">2025</text><text x="1140.0" y="344.0" class="rd-axis" text-anchor="middle">2026</text>
  <g>
    <path d="M 240.0,104.0 L 540.0,104.0 L 1140.0,104.0" fill="none" stroke="#22D3EE" stroke-width="6"
          stroke-linecap="round" stroke-opacity="0.92" filter="url(#rd-glow)"/>
    <path d="M 240.0,104.0 L 540.0,104.0 L 1140.0,104.0" fill="none" stroke="#FFFFFF" stroke-width="2"
          stroke-linecap="round" stroke-opacity="0.45"
          stroke-dasharray="3 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-42"
               dur="3s" repeatCount="indefinite"/>
    </path>
  </g><circle cx="240.0" cy="104.0" r="9" fill="#22D3EE" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="240.0" y="88.0" class="rd-station" text-anchor="middle">Django</text><circle cx="540.0" cy="104.0" r="9" fill="#22D3EE" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="540.0" y="130.0" class="rd-station" text-anchor="middle">FastAPI</text><circle cx="1140.0" cy="104.0" r="9" fill="#22D3EE" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="1140.0" y="88.0" class="rd-station" text-anchor="middle">Cortex</text>
  <circle cx="1140.0" cy="104.0" r="14" fill="none" stroke="#22D3EE"
