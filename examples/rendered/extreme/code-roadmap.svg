          stroke-dasharray="3 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-42"
               dur="3s" repeatCount="indefinite"/>
    </path>
  </g><circle cx="240.0" cy="192.0" r="9" fill="#FF6B9D" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="240.0" y="176.0" class="rd-station" text-anchor="middle">Vue 2</text><circle cx="540.0" cy="192.0" r="9" fill="#FF6B9D" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="540.0" y="218.0" class="rd-station" text-anchor="middle">React</text><circle cx="990.0" cy="192.0" r="9" fill="#FF6B9D" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="990.0" y="176.0" class="rd-station" text-anchor="middle">Three.js</text>
  <circle cx="990.0" cy="192.0" r="14" fill="none" stroke="#FF6B9D"
          stroke-width="2" stroke-opacity="0.8">
    <animate attributeName="r" values="14;22;14" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.85;0;0.85"
             dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="990.0" y="196.0" class="rd-live" text-anchor="middle">●</text>
  <g>
    <path d="M 390.0,280.0 L 840.0,280.0" fill="none" stroke="#FFD23F" stroke-width="6"
          stroke-linecap="round" stroke-opacity="0.92" filter="url(#rd-glow)"/>
    <path d="M 390.0,280.0 L 840.0,280.0" fill="none" stroke="#FFFFFF" stroke-width="2"
          stroke-linecap="round" stroke-opacity="0.45"
          stroke-dasharray="3 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-42"
               dur="3s" repeatCount="indefinite"/>
    </path>
  </g><circle cx="390.0" cy="280.0" r="9" fill="#FFD23F" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="390.0" y="264.0" class="rd-station" text-anchor="middle">AWS</text><circle cx="840.0" cy="280.0" r="9" fill="#FFD23F" stroke="#FFFFFF" stroke-width="2.5" filter="url(#rd-glow)"/><text x="840.0" y="306.0" class="rd-station" text-anchor="middle">K8s</text>
  <circle cx="840.0" cy="280.0" r="14" fill="none" stroke="#FFD23F"
          stroke-width="2" stroke-opacity="0.8">
    <animate attributeName="r" values="14;22;14" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.85;0;0.85"
             dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <text x="840.0" y="284.0" class="rd-live" text-anchor="middle">●</text><text x="40" y="90" class="rd-legend-h">LINES</text><rect x="40" y="100.0" width="22" height="8" rx="3" fill="#22D3EE"/><text x="68" y="108.0" class="rd-legend">Backend</text><rect x="40" y="188.0" width="22" height="8" rx="3" fill="#FF6B9D"/><text x="68" y="196.0" class="rd-legend">Frontend</text><rect x="40" y="276.0" width="22" height="8" rx="3" fill="#FFD23F"/><text x="68" y="284.0" class="rd-legend">Cloud</text>
</svg>
