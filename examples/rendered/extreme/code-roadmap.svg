  </circle>
  <text x="1140.0" y="108.0" class="rd-live" text-anchor="middle">●</text>
  <g>
    <path d="M 240.0,192.0 L 540.0,192.0 L 990.0,192.0" fill="none" stroke="#FF6B9D" stroke-width="6"
          stroke-linecap="round" stroke-opacity="0.92" filter="url(#rd-glow)"/>
    <path d="M 240.0,192.0 L 540.0,192.0 L 990.0,192.0" fill="none" stroke="#FFFFFF" stroke-width="2"
