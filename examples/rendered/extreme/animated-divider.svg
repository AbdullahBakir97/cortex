      <animate attributeName="x1" values="-1;1;-1" dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animate attributeName="x2" values="0;2;0"  dur="11s" repeatCount="indefinite" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </linearGradient>
  </defs>
  <rect x="0" y="2.5" width="1200" height="1" fill="#7B5EAA" fill-opacity="0.25"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#sweep)"/>
