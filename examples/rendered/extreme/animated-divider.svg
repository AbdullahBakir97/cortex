      <stop offset="0%"   stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#4F8CC4"       stop-opacity="0.55"/>
      <stop offset="50%"  stop-color="#C95E8A"       stop-opacity="0.95"/>
