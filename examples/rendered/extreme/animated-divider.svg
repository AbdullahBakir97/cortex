<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="6" viewBox="0 0 1200 6" preserveAspectRatio="none" role="presentation" aria-hidden="true">
  <defs>
