# yaml-language-server: $schema=https://cortex.dev/schema/v1.json
# .github/cortex.yml — Abdullah's extreme profile (~120 lines)
# Every feature on. The reference for "what's possible".

version: 1

identity:
  name:        "Abdullah Bakir"
  github_user: "AbdullahBakir97"
  tagline:     "Full-Stack Developer ⚡ Python · Django · Vue · Nuxt"
  location:    "Germany"
  pronouns:    "he/him"
  email:       "abdullah.bakir.1997@gmail.com"
  socials:
    linkedin:  "abdullah-bakir-809065273"
    telegram:  "BlackSea0011"
    instagram: "abdulahbaker"

brand:
  palette: "neon-rainbow"
  # Coordinated theme — propagates as default colors to every widget.
  # Try: outrun (default) | sunset | midnight | minimal | cyberpunk | rose
  theme: "outrun"
  typography:
    display: "Inter"
    mono:    "JetBrains Mono"
  animations:
    enabled:   true
    intensity: "high"

brain:
  enabled: true
  source:  "wikimedia"
  three_d:
    enabled:     true
    auto_rotate: true
  regions:
    frontal:    { domain: "Backend",       tools: [Python, Django, DRF, FastAPI, Flask] }
    parietal:   { domain: "Architecture",  tools: [Microservices, RabbitMQ, Event-Driven] }
    occipital:  { domain: "Frontend",      tools: [Vue, Nuxt, TypeScript, Tailwind] }
    temporal:   { domain: "Data Layer",    tools: [PostgreSQL, Redis, MySQL, SQLite] }
    cerebellum: { domain: "DevOps",        tools: [Docker, Git, GitHub Actions, AWS] }
    brainstem:  { domain: "AI & Data",     tools: [PyTorch, TensorFlow, LLMs, RAG] }

typing:
  header:
    enabled:            true
    languages:          [en, de, ar]
    lines_per_language: 10
    cycle:              "fast"
  about:
    enabled: true
    lines:   50
    include: [personal, generic]
  motto:
    enabled: true
    lines:   50

cards:
  tech_stack:
    enabled:    true
    show_stats: true
  current_focus:
    enabled: true
    tiles:
      - project:     "PyDev Platform"
        status:      ACTIVE
        accent:      red
        emoji:       "🛠️"
        description: "Enterprise-grade Python tooling: CLI + secure template marketplace + AI-driven dev features."
        tech:        [Python, CLI, AI, "GitHub Apps"]
      - project:     "Baeckrei"
        status:      SHIPPING
        accent:      orange
        emoji:       "🥖"
        description: "Bakery management system: inventory, recipes, online orders, customer accounts, real-time production scheduling."
        tech:        [Django, Vue, Postgres, Redis]
      - project:     "Stock-Manager"
        status:      ACTIVE
        accent:      green
        emoji:       "📦"
        description: "Desktop inventory app for shop floors — local-first, barcode-aware, role-based. v2.4.3 in production."
        tech:        [Python, PyQt, SQLite, Desktop]
      - project:     "Generative AI"
        status:      EXPLORING
        accent:      purple
        emoji:       "🤖"
        description: "Integrating LLMs and RAG into Django/Vue applications. Local agents, prompt engineering, embeddings."
        tech:        [LLMs, RAG, PyTorch, Agents]
      - project:     "Docker & CI/CD"
        status:      MAINTAINING
        accent:      cyan
        emoji:       "🐳"
        description: "Production deploy workflows that don't break on Friday — multi-stage builds, GitHub Actions, blue-green."
        tech:        [Docker, "GH Actions", Linux, Nginx]
      - project:     "Media Archive"
        status:      BUILDING
        accent:      gold
        emoji:       "📚"
        description: "Digital archive for magazines & news — edition mgmt, metadata, multi-format preservation, searchable taxonomies."
        tech:        [Django, DRF, Postgres, Archive]
  yearly_highlights:
    enabled:          true
    start_year:       2023
    bullets_per_year: 3
    years:
      - year: 2023
        label: "ORIGIN"
        headline: "First Steps"
        bullets:
          - "Started shipping public projects — Django-Store, Jobs-Portal, BookStore."
          - "Built foundations in Python, Django, REST APIs, JS & HTML/CSS."
          - "Earned first community stars — Jobs-Portal & Django-Blog took off."
        stats:
          - { num: "15+",   label: "PROJECTS" }
          - { num: "30★",   label: "PEAK STARS" }
          - { num: "FIRST", label: "CLIENT" }
      - year: 2024
        label: "FOUNDATION"
        headline: "A Year of Shipping"
        bullets:
          - "Wave of full-stack Django + Vue projects went live for real users."
          - "Established long-running client engagements that still run today."
          - "Earned community recognition — Barber-Salon hit 52★, Django-LMS 22★."
        stats:
          - { num: "25+", label: "PROJECTS" }
          - { num: "52★", label: "PEAK STARS" }
          - { num: "5+",  label: "CLIENTS" }
      - year: 2025
        label: "GROWTH"
        headline: "Production & AI"
        bullets:
          - "Maintained & grew long-running client systems through their first full year in production."
          - "Hands-on with the AI/LLM stack — local models, RAG, agent workflows."
          - "Contributed to community & educational projects beyond own work."
        stats:
          - { num: "2+",   label: "SAAS LIVE" }
          - { num: "10+",  label: "AI EXPERIMENTS" }
          - { num: "200+", label: "DEPLOYS" }
      - year: 2026
        label: "CURRENT YEAR"
        headline: "Tooling & Reach"
        bullets:
          - "Shifting to developer tooling & automation — building for engineers, not just end users."
          - "Branching from web into desktop and CLI applications."
          - "Investing in public presence — portfolio, blog, open-source."
        stats:
          - { num: "5",  label: "GH APPS" }
          - { num: "v1", label: "PYDEV PLATFORM" }
          - { num: "9+", label: "NEW REPOS" }

  # Animated banners — capsule-render replacement. Renders as header-banner.svg
  # / footer-banner.svg. shape: wave|slice|rect; animation: drift|pulse|static.
  # colors: optional list of hex stops (defaults to jewel-tone palette).
  header:
    enabled:   true
    shape:     "wave"
    title:     "Cortex"
    subtitle:  "Turn your GitHub into a cinematic neon brain skill atlas"
    height:    240
    animation: "drift"
  footer:
    enabled:   true
    shape:     "wave"
    title:     "@AbdullahBakir97"
    subtitle:  "Built with Cortex · cortex.dev"
    height:    180
    animation: "drift"
  # Skill badges — compact tech / skill strip. Configure shape (pill/hex/shield/
  # circle), layout (row/grid/marquee), and animation (stagger/shimmer/pulse/static).
  # Each item picks built-in monogram + brand color via `icon: <slug>`, or override
  # everything with explicit `color` / `icon_svg`.
  badges:
    enabled: true
    shape: pill
    layout: row
    animation: stagger
    items:
      - { icon: python,     label: "Python",      value: "Senior" }
      - { icon: rust,       label: "Rust",        value: "85%" }
      - { icon: typescript, label: "TypeScript",  value: "Senior" }
      - { icon: react,      label: "React",       value: "Mid" }
      - { icon: nodejs,     label: "Node.js",     value: "Daily" }
      - { icon: aws,        label: "AWS",         value: "Certified" }
      - { icon: docker,     label: "Docker",      value: "Daily" }
      - { icon: kubernetes, label: "Kubernetes",  value: "CKA" }
      - { icon: postgres,   label: "PostgreSQL",  value: "Senior" }
      - { icon: github,     label: "GitHub",      value: "Pro" }
  # ─── Tier-1 mind-blowing widgets ────────────────────────────────────────
  synthwave:
    enabled: true
    title:    "CORTEX"
    subtitle: "Cinematic profile generator"
    palette:  outrun
    height:   320
  galaxy:
    enabled: true
    title: "Skill galaxy"
    background: nebula
    stars:
      - { label: "Python",     color: "#FFD23F", size: 6 }
      - { label: "Rust",       color: "#CE422B", size: 5 }
      - { label: "TypeScript", color: "#3178C6", size: 5 }
      - { label: "React",      color: "#61DAFB", size: 4 }
      - { label: "AWS",        color: "#FF9900", size: 5 }
      - { label: "PostgreSQL", color: "#4169E1", size: 4 }
      - { label: "Docker",     color: "#22D3EE", size: 4 }
      - { label: "Kubernetes", color: "#326CE5", size: 4 }
      - { label: "Three.js",   color: "#FF6B9D", size: 4 }
      - { label: "Pydantic",   color: "#34D399", size: 3 }
    connections:
      - ["Python", "Rust"]
      - ["Python", "PostgreSQL"]
      - ["Python", "Pydantic"]
      - ["TypeScript", "React"]
      - ["React", "Three.js"]
      - ["AWS", "Docker"]
      - ["Docker", "Kubernetes"]
  radar:
    enabled: true
    title: "Stack profile"
    breathe: true
    color: "#7B5EAA"
    axes:
      - { label: "Backend",   value: 92 }
      - { label: "Frontend",  value: 68 }
      - { label: "DevOps",    value: 78 }
      - { label: "Data / ML", value: 55 }
      - { label: "Mobile",    value: 35 }
      - { label: "Design",    value: 72 }
  roadmap:
    enabled: true
    title: "Career roadmap"
    lines:
      - name: "Backend"
        color: "#22D3EE"
        stations:
          - { label: "Django",   year: 2020 }
          - { label: "FastAPI",  year: 2022 }
          - { label: "Cortex",   year: 2026, is_current: true }
      - name: "Frontend"
        color: "#FF6B9D"
        stations:
          - { label: "Vue 2",    year: 2020 }
          - { label: "React",    year: 2022 }
          - { label: "Three.js", year: 2025, is_current: true }
      - name: "Cloud"
        color: "#FFD23F"
        stations:
          - { label: "AWS",      year: 2021 }
          - { label: "K8s",      year: 2024, is_current: true }

  # ─── Tier-2 widgets ─────────────────────────────────────────────────────
  heatmap:
    enabled: true
    palette: neon-rainbow
    glow:    true
  cubes:
    enabled: true
    cubes:
      - { label: "PRs",     value: "1.2k" }
      - { label: "Commits", value: "8.4k" }
      - { label: "Stars",   value: "3.1k" }
      - { label: "Repos",   value: "47" }
      - { label: "Streak",  value: "112d" }
  # ─── Tier-3 widgets (batch 3) ───────────────────────────────────────────
  dna:
    enabled: true
    title: "Code DNA"
    languages: ["Python", "TypeScript", "Rust", "Go", "React", "SQL", "Bash", "Docker"]
  globe:
    enabled: true
    title: "Where I work from"
    rotate: true
    pins:
      - { label: "Berlin",        lon: 13.4,   lat: 52.5 }
      - { label: "Istanbul",      lon: 28.97,  lat: 41.0 }
      - { label: "London",        lon: -0.13,  lat: 51.5 }
      - { label: "New York",      lon: -74.0,  lat: 40.7 }
      - { label: "San Francisco", lon: -122.4, lat: 37.8 }
      - { label: "Tokyo",         lon: 139.7,  lat: 35.7 }
  particles:
    enabled: true
    title: "Skill cloud"
    items:
      - { label: "Python",     weight: 2.6 }
      - { label: "Rust",       weight: 2.0 }
      - { label: "TypeScript", weight: 2.4 }
      - { label: "React",      weight: 1.8 }
      - { label: "AWS",        weight: 1.6 }
      - { label: "Docker",     weight: 1.4 }
      - { label: "Postgres",   weight: 1.4 }
      - { label: "Redis",      weight: 1.0 }
      - { label: "FastAPI",    weight: 1.6 }
      - { label: "Three.js",   weight: 1.2 }
      - { label: "Pydantic",   weight: 1.2 }
      - { label: "Kafka",      weight: 0.8 }
  now_playing:
    enabled: true
    activity: "Coding"
    language: "Python"
    project:  "Cortex v0.4"
    progress: 0.62
    elapsed:  "1:24"

  trophies:
    enabled: true
    title: "Achievements"
    columns: 4
    trophies:
      - { label: "First PR",       date: "2018",    glyph: "★" }
      - { label: "1k Commits",     date: "2020",    glyph: "🔥" }
      - { label: "OSS Maintainer", date: "2022",    glyph: "Ⓜ" }
      - { label: "AWS Certified",  date: "2023",    glyph: "☁" }
      - { label: "Speaker",        date: "2024",    glyph: "🎤" }
      - { label: "Cortex v1",      date: "2026-04", glyph: "🧠" }
      - { label: "100k Downloads", date: "2026",    glyph: "⬇" }
      - { label: "Hall of Fame",   date: "2026",    glyph: "Ⓗ" }

  # Showcase block URL override — cortex's own marketing README points at the
  # example renders inside this repo rather than a user profile repo.
  showcase:
    base_url: "https://raw.githubusercontent.com/AbdullahBakir97/cortex/main/examples/rendered/extreme"

contributions:
  snake:      true
  skylines:   { years: [2023, 2024, 2025, 2026], stl: true }
  cities:     { years: [2024, 2025, 2026] }
  profile_3d: true

auto_update:
  schedule: "0 6 * * *"
  markers:
    activity:         true
    latest_releases:  true
    quote_of_the_day: true
    gitgraph:         true
    pagespeed:
      enabled: true
      url:     "http://kharsa-style.de/"
    wakatime:
      enabled: true

